name: Android Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Restore signing key
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.jks
          {
            printf 'storeFile=release.jks\n'
            printf 'storePassword=%s\n' '${{ secrets.ANDROID_KEYSTORE_PASSWORD }}'
            printf 'keyAlias=%s\n' '${{ secrets.ANDROID_KEY_ALIAS }}'
            printf 'keyPassword=%s\n' '${{ secrets.ANDROID_KEY_PASSWORD }}'
          } > keystore.properties

      - name: Build release APK
        run: ./gradlew assembleRelease --console=plain

      - name: Check manifest has no network permissions
        run: |
          manifest="app/build/intermediates/merged_manifests/release/processReleaseManifest/AndroidManifest.xml"
          if grep -E "android.permission.INTERNET|android.permission.ACCESS_NETWORK_STATE" "$manifest"; then
            echo "Network permission detected in release manifest"
            exit 1
          fi

      - name: Prepare artifacts
        run: |
          apk="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$apk" ]; then
            apk="$(ls app/build/outputs/apk/release/*.apk | head -1)"
          fi
          cp "$apk" "FastLink-${GITHUB_REF_NAME}.apk"
          sha256sum "FastLink-${GITHUB_REF_NAME}.apk" > "FastLink-${GITHUB_REF_NAME}.apk.sha256"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            FastLink-${{ github.ref_name }}.apk
            FastLink-${{ github.ref_name }}.apk.sha256
          body: |
            FastLink VPN ${{ github.ref_name }}

            - Commit: ${{ github.sha }}
            - Release APK: `FastLink-${{ github.ref_name }}.apk`
            - SHA-256: see attached `.sha256`
            - Manifest network check: no `INTERNET` or `ACCESS_NETWORK_STATE`
