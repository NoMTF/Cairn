name: Android Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Prepare Gradle
        run: chmod +x ./gradlew

      - name: Build APK
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.jks
            {
              printf 'storeFile=release.jks\n'
              printf 'storePassword=%s\n' "$ANDROID_KEYSTORE_PASSWORD"
              printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS"
              printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD"
            } > keystore.properties
            ./gradlew assembleRelease --console=plain
          else
            ./gradlew assembleDebug --console=plain
          fi

      - name: Check manifest has no network permissions
        run: |
          manifest="app/build/intermediates/merged_manifests/release/processReleaseManifest/AndroidManifest.xml"
          if [ ! -f "$manifest" ]; then
            manifest="app/build/intermediates/merged_manifests/debug/processDebugManifest/AndroidManifest.xml"
          fi
          if grep -E "android.permission.INTERNET|android.permission.ACCESS_NETWORK_STATE" "$manifest"; then
            echo "Network permission detected in release manifest"
            exit 1
          fi

      - name: Prepare artifacts
        run: |
          apk="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$apk" ]; then
            apk="$(ls app/build/outputs/apk/release/*.apk app/build/outputs/apk/debug/*.apk 2>/dev/null | head -1)"
          fi
          cp "$apk" "FastLink.apk"
          sha256sum "FastLink.apk" > "FastLink.apk.sha256"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: FastLink VPN ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            FastLink.apk
            FastLink.apk.sha256
          body: |
            FastLink VPN ${{ github.ref_name }}

            - 安装包：`FastLink.apk`
            - 校验：见 `FastLink.apk.sha256`
            - 网络权限检查：无 `INTERNET` / `ACCESS_NETWORK_STATE`
